
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clima Simões Filho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fadeInUp {
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes fall {
        to {
          transform: translateY(110vh);
        }
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-33.33%); }
      }
      .animate-marquee {
        animation: marquee 35s linear infinite;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom": "https://esm.sh/react-dom@^19.2.4",
        "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useState, useEffect, useCallback, useMemo } from 'react';
      import { createRoot } from 'react-dom/client';
      import { 
        CloudRain, Sun, Cloud, CloudLightning, Moon, RefreshCw, MapPin, 
        Droplets, Wind, Thermometer, Clock 
      } from 'lucide-react';
      import { GoogleGenAI, Type } from "@google/genai";

      // --- Types & Constants ---
      const WeatherCondition = {
        SUNNY: 'ensolarado',
        CLOUDY: 'nublado',
        RAINY: 'chuvoso',
        STORM: 'tempestade',
        NIGHT: 'noite'
      };

      // --- Gemini Service ---
      const ai = new GoogleGenAI({ apiKey: process.env.GEMINI_API_KEY });

      const getSimulatedWeather = async (city) => {
        try {
          const response = await ai.models.generateContent({
            model: "gemini-3-flash-preview",
            contents: `Forneça os dados climáticos atuais e uma previsão para os próximos 3 dias para a cidade de ${city}, Bahia. 
            Retorne APENAS um JSON válido seguindo exatamente o schema fornecido.`,
            config: {
              responseMimeType: "application/json",
              responseSchema: {
                type: Type.OBJECT,
                properties: {
                  temp: { type: Type.NUMBER },
                  condition: { 
                    type: Type.STRING, 
                    enum: ['ensolarado', 'nublado', 'chuvoso', 'tempestade', 'noite'],
                    description: "A condição predominante atual."
                  },
                  description: { type: Type.STRING },
                  humidity: { type: Type.NUMBER },
                  windSpeed: { type: Type.NUMBER },
                  feelsLike: { type: Type.NUMBER },
                  forecast: {
                    type: Type.ARRAY,
                    items: {
                      type: Type.OBJECT,
                      properties: {
                        day: { type: Type.STRING, description: "Abreviatura do dia da semana (ex: Seg, Ter)." },
                        tempMin: { type: Type.NUMBER },
                        tempMax: { type: Type.NUMBER },
                        condition: { 
                          type: Type.STRING, 
                          enum: ['ensolarado', 'nublado', 'chuvoso', 'tempestade', 'noite']
                        }
                      },
                      required: ["day", "tempMin", "tempMax", "condition"]
                    }
                  }
                },
                required: ["temp", "condition", "description", "humidity", "windSpeed", "feelsLike", "forecast"]
              }
            }
          });

          const data = JSON.parse(response.text || '{}');
          return {
            ...data,
            lastUpdate: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
          };
        } catch (error) {
          console.error("Error fetching weather from Gemini:", error);
          return {
            temp: 28,
            condition: WeatherCondition.RAINY,
            description: "Chuva leve passageira",
            humidity: 82,
            windSpeed: 12,
            feelsLike: 30,
            lastUpdate: "Agora",
            forecast: [
              { day: 'Amanhã', tempMin: 23, tempMax: 29, condition: WeatherCondition.RAINY },
              { day: 'Qua', tempMin: 22, tempMax: 30, condition: WeatherCondition.CLOUDY },
              { day: 'Qui', tempMin: 24, tempMax: 32, condition: WeatherCondition.SUNNY }
            ]
          };
        }
      };

      const getLatestNews = async () => {
        try {
          const response = await ai.models.generateContent({
            model: "gemini-3-flash-preview",
            contents: "Quais são as 5 principais notícias de hoje no portal G1 (Globo)? Forneça os títulos principais.",
            config: {
              tools: [{ googleSearch: {} }],
              responseMimeType: "application/json",
              responseSchema: {
                type: Type.ARRAY,
                items: {
                  type: Type.OBJECT,
                  properties: {
                    title: { type: Type.STRING },
                    url: { type: Type.STRING }
                  },
                  required: ["title", "url"]
                }
              }
            }
          });

          return JSON.parse(response.text || '[]');
        } catch (error) {
          console.error("Error fetching news:", error);
          return [
            { title: "G1: Acompanhe as principais notícias do dia no portal oficial.", url: "https://g1.globo.com" },
            { title: "Clima em Simões Filho: Temperatura estável no recôncavo baiano.", url: "https://g1.globo.com/ba/bahia" }
          ];
        }
      };

      // --- Components ---

      const RainEffect = () => {
        const drops = useMemo(() => {
          return Array.from({ length: 40 }).map((_, i) => ({
            id: i,
            left: `${Math.random() * 100}%`,
            delay: `${Math.random() * 5}s`,
            duration: `${4 + Math.random() * 4}s`,
            opacity: 0.1 + Math.random() * 0.4,
            length: `${15 + Math.random() * 25}px`
          }));
        }, []);

        return React.createElement('div', { className: "absolute inset-0 pointer-events-none overflow-hidden z-10" },
          drops.map((drop) => React.createElement('div', {
            key: drop.id,
            className: "absolute bg-white rounded-full",
            style: {
              left: drop.left,
              top: '-50px',
              width: '1.5px',
              height: drop.length,
              opacity: drop.opacity,
              animation: `fall ${drop.duration} linear infinite`,
              animationDelay: drop.delay,
              filter: 'blur(0.5px)'
            }
          }))
        );
      };

      const WeatherCard = ({ data }) => {
        return React.createElement('div', { className: "grid grid-cols-2 gap-4 w-full max-w-xs mt-8" },
          React.createElement('div', { className: "glass p-4 rounded-3xl flex flex-col items-center justify-center animate-fadeInUp", style: { animationDelay: '0.1s' } },
            React.createElement(Thermometer, { className: "w-5 h-5 text-blue-200 mb-2" }),
            React.createElement('span', { className: "text-xs text-blue-100/60 uppercase font-semibold" }, "Sensação"),
            React.createElement('span', { className: "text-xl font-bold text-white" }, `${data.feelsLike}°C`)
          ),
          React.createElement('div', { className: "glass p-4 rounded-3xl flex flex-col items-center justify-center animate-fadeInUp", style: { animationDelay: '0.2s' } },
            React.createElement(Droplets, { className: "w-5 h-5 text-blue-300 mb-2" }),
            React.createElement('span', { className: "text-xs text-blue-100/60 uppercase font-semibold" }, "Humidade"),
            React.createElement('span', { className: "text-xl font-bold text-white" }, `${data.humidity}%`)
          ),
          React.createElement('div', { className: "glass p-4 rounded-3xl flex flex-col items-center justify-center animate-fadeInUp", style: { animationDelay: '0.3s' } },
            React.createElement(Wind, { className: "w-5 h-5 text-green-200 mb-2" }),
            React.createElement('span', { className: "text-xs text-blue-100/60 uppercase font-semibold" }, "Vento"),
            React.createElement('span', { className: "text-xl font-bold text-white" }, `${data.windSpeed} km/h`)
          ),
          React.createElement('div', { className: "glass p-4 rounded-3xl flex flex-col items-center justify-center animate-fadeInUp", style: { animationDelay: '0.4s' } },
            React.createElement(Clock, { className: "w-5 h-5 text-purple-200 mb-2" }),
            React.createElement('span', { className: "text-xs text-blue-100/60 uppercase font-semibold" }, "Atualizado"),
            React.createElement('span', { className: "text-xl font-bold text-white text-center" }, data.lastUpdate)
          )
        );
      };

      const ForecastCard = ({ forecast }) => {
        const getIcon = (condition) => {
          const iconClass = "w-6 h-6 text-white";
          switch (condition) {
            case WeatherCondition.SUNNY: return React.createElement(Sun, { className: iconClass });
            case WeatherCondition.RAINY: return React.createElement(CloudRain, { className: iconClass });
            case WeatherCondition.STORM: return React.createElement(CloudLightning, { className: iconClass });
            case WeatherCondition.NIGHT: return React.createElement(Moon, { className: iconClass });
            default: return React.createElement(Cloud, { className: iconClass });
          }
        };

        return React.createElement('div', { className: "glass w-full max-w-xs mt-6 p-4 rounded-3xl animate-fadeInUp", style: { animationDelay: '0.5s' } },
          React.createElement('h3', { className: "text-xs font-bold text-white/60 uppercase tracking-widest mb-4 ml-1" }, "Previsão 3 Dias"),
          React.createElement('div', { className: "flex flex-col gap-4" },
            forecast.map((day, index) => React.createElement('div', { key: index, className: "flex items-center justify-between" },
              React.createElement('span', { className: "text-sm font-semibold w-12" }, day.day),
              React.createElement('div', { className: "flex-1 flex justify-center" }, getIcon(day.condition)),
              React.createElement('div', { className: "flex gap-3 text-sm font-bold w-20 justify-end" },
                React.createElement('span', { className: "text-white" }, `${day.tempMax}°`),
                React.createElement('span', { className: "text-white/40" }, `${day.tempMin}°`)
              )
            ))
          )
        );
      };

      const NewsTicker = ({ news }) => {
        if (!news || news.length === 0) return null;
        const displayNews = [...news, ...news, ...news];

        return React.createElement('div', { className: "absolute bottom-0 left-0 w-full z-40" },
          React.createElement('div', { className: "bg-black/80 backdrop-blur-xl h-14 flex items-center overflow-hidden border-t border-white/10" },
            React.createElement('div', { className: "bg-red-700 px-4 h-full flex items-center justify-center z-50 shadow-[4px_0_15px_rgba(0,0,0,0.5)]" },
              React.createElement('span', { className: "text-[11px] font-black uppercase tracking-widest text-white italic" }, "G1")
            ),
            React.createElement('div', { className: "flex whitespace-nowrap animate-marquee" },
              displayNews.map((item, index) => React.createElement('div', { key: index, className: "flex items-center px-8" },
                React.createElement('span', { className: "text-sm font-bold text-white tracking-wide" }, item.title),
                React.createElement('div', { className: "mx-8 w-2 h-2 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.8)]" })
              ))
            )
          )
        );
      };

      // --- Main App ---

      const App = () => {
        const [weather, setWeather] = useState(null);
        const [news, setNews] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);

        const fetchData = useCallback(async () => {
          setLoading(true);
          try {
            const [weatherData, newsData] = await Promise.all([
              getSimulatedWeather("Simões Filho"),
              getLatestNews()
            ]);
            setWeather(weatherData);
            setNews(newsData);
            setError(null);
          } catch (err) {
            setError("Erro ao carregar dados.");
          } finally {
            setLoading(false);
          }
        }, []);

        useEffect(() => {
          fetchData();
        }, [fetchData]);

        const getBackgroundClass = () => {
          if (!weather) return 'from-neutral-900 to-black';
          switch (weather.condition) {
            case WeatherCondition.SUNNY: return 'from-orange-500 via-amber-600 to-blue-900';
            case WeatherCondition.RAINY: return 'from-slate-800 via-blue-950 to-black';
            case WeatherCondition.STORM: return 'from-purple-950 via-indigo-950 to-black';
            case WeatherCondition.CLOUDY: return 'from-slate-600 via-slate-800 to-zinc-950';
            case WeatherCondition.NIGHT: return 'from-black via-blue-950 to-black';
            default: return 'from-blue-600 to-black';
          }
        };

        const getWeatherIcon = () => {
          if (!weather) return React.createElement(Cloud, { className: "w-20 h-20 text-white" });
          const iconClass = "w-24 h-24 text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)] animate-pulse";
          switch (weather.condition) {
            case WeatherCondition.SUNNY: return React.createElement(Sun, { className: iconClass });
            case WeatherCondition.RAINY: return React.createElement(CloudRain, { className: iconClass });
            case WeatherCondition.STORM: return React.createElement(CloudLightning, { className: iconClass });
            case WeatherCondition.NIGHT: return React.createElement(Moon, { className: iconClass });
            default: return React.createElement(Cloud, { className: iconClass });
          }
        };

        const isRaining = weather?.condition === WeatherCondition.RAINY || weather?.condition === WeatherCondition.STORM;

        return React.createElement('div', { className: "flex justify-center items-center w-full h-screen bg-black" },
          React.createElement('div', { 
            className: `relative w-full h-full max-w-[450px] aspect-[9/16] bg-gradient-to-b ${getBackgroundClass()} overflow-hidden transition-all duration-1000 ease-in-out shadow-[0_0_100px_rgba(0,0,0,0.5)] flex flex-col items-center px-6 py-10 text-white`
          },
            isRaining && React.createElement(RainEffect),
            React.createElement('div', { className: "z-20 flex flex-col items-center w-full" },
              React.createElement('div', { className: "flex items-center gap-2 mb-1 bg-white/10 px-5 py-2 rounded-full border border-white/20 backdrop-blur-md" },
                React.createElement(MapPin, { className: "w-4 h-4 text-orange-400" }),
                React.createElement('h1', { className: "text-sm font-black tracking-widest uppercase text-white shadow-sm" }, "Simões Filho, BA")
              )
            ),
            loading ? React.createElement('div', { className: "flex-1 flex flex-col items-center justify-center z-20" },
              React.createElement('div', { className: "animate-spin mb-4" },
                React.createElement(RefreshCw, { className: "w-10 h-10 text-white/20" })
              ),
              React.createElement('p', { className: "text-white/40 font-bold uppercase tracking-widest text-xs" }, "Sincronizando...")
            ) : weather ? React.createElement('div', { className: "flex-1 flex flex-col items-center w-full z-20 overflow-y-auto no-scrollbar pb-20" },
              React.createElement('div', { className: "flex flex-col items-center mt-10 mb-8" },
                React.createElement('div', { className: "relative mb-6" },
                  getWeatherIcon(),
                  React.createElement('div', { className: "absolute -inset-10 bg-white/10 blur-[60px] rounded-full -z-10" })
                ),
                React.createElement('div', { className: "text-center" },
                  React.createElement('div', { className: "flex items-start justify-center" },
                    React.createElement('span', { className: "text-8xl font-black tracking-tighter drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]" }, Math.round(weather.temp)),
                    React.createElement('span', { className: "text-3xl font-bold mt-3 opacity-80" }, "°C")
                  ),
                  React.createElement('p', { className: "text-xl font-bold capitalize mt-2 text-white drop-shadow-md" }, weather.description)
                )
              ),
              React.createElement(WeatherCard, { data: weather }),
              React.createElement(ForecastCard, { forecast: weather.forecast }),
              React.createElement('button', { 
                onClick: fetchData,
                className: "mt-8 flex items-center gap-2 glass px-8 py-4 rounded-3xl hover:bg-white/20 active:scale-95 transition-all text-xs font-black tracking-[0.2em] uppercase"
              },
                React.createElement(RefreshCw, { className: "w-4 h-4" }),
                "Atualizar Dados"
              )
            ) : React.createElement('div', { className: "flex-1 flex items-center justify-center z-20" },
              React.createElement('p', { className: "text-white/60 font-bold" }, error || "Falha ao obter dados")
            ),
            React.createElement(NewsTicker, { news: news }),
            React.createElement('div', { className: "absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-black via-black/60 to-transparent pointer-events-none z-10" })
          )
        );
      };

      const container = document.getElementById('root');
      const root = createRoot(container);
      root.render(React.createElement(App));
    </script>
  </body>
</html>
